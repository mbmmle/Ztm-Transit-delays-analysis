version: '3.8'

# Shared Airflow configuration to avoid duplication
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin@postgres:5432/Warsaw_Bus_DB
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
    - DB_HOST=postgres  # Important: Airflow reaches Postgres via the service name
    - _PIP_ADDITIONAL_REQUIREMENTS=pandas sqlalchemy psycopg2-binary requests gtfs-realtime-bindings numpy docker
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts # Mount the scripts folder
    - ./logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  user: "50000:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --- EXISTING SERVICES ---
  pyspark:
    build: .
    container_name: pyspark-jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./work:/home/jovyan/work
      - ./scripts:/home/jovyan/work/scripts
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - DB_HOST=postgres # Spark also connects to the "postgres" service
    user: root
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: local-postgres
    healthcheck: # Lets Airflow wait until Postgres is ready
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "Warsaw_Bus_DB"]
      interval: 10s
      retries: 5
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=Warsaw_Bus_DB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- AIRFLOW SERVICES ---
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --role Admin
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --email admin@example.com"

  ai-agent:
    image: python:3.10-slim
    container_name: ztm_ai_agent
    working_dir: /app
    volumes:
      - ./frontend:/app/frontend
      - ./requirements.txt:/app/requirements.txt
    env_file:
      - .env
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt && 
               streamlit run frontend/app.py --server.address=0.0.0.0 --server.port=8501"
    ports:
      - "8505:8501"
    depends_on:
      - postgres # Czat musi czekać, aż wstanie baza danych
volumes:
  pgdata: # Keep the existing persistent volume