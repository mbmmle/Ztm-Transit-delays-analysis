version: '3.8'

services:
  pyspark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pyspark-jupyter
    ports:
      - "8888:8888"   # Port for Jupyter Lab/Notebook
      - "4040:4040"   # Port for Spark UI 
    volumes:
      - ./work:/home/jovyan/work  #Mapping Work container
    environment:
      - JUPYTER_ENABLE_LAB=yes    
    user: root                    
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: local-postgres
    environment:                  #Database Credencials
      - POSTGRES_USER=admin       
      - POSTGRES_PASSWORD=admin   
      - POSTGRES_DB=Warsaw_Bus_DB    
    ports:
      - "5432:5432"               
    volumes:
      - pgdata:/var/lib/postgresql/data  # Zapisuje dane bazy trwale na dysku

volumes:
  pgdata:  # Definicja wolumenu dla Postgresa  